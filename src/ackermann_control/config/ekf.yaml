ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- 1. YOUR WHEEL ODOMETRY ---
    odom0: /odom_raw  
    odom0_config: [false, false, false,
                   false, false, true,
                   true,  false, false,  # Trusting Wheel Encoders for Linear X Velocity
                   false, false, false,
                   false, false, false]
    
    odom0_differential: false
    odom0_queue_size: 10

    # --- 2. YOUR OUSTER IMU ---
    imu0: /ouster/imu
    imu0_config: [false, false, false,
                  false, false, false,    # Trusting IMU for Yaw
                  false, false, false,
                  false, false, false,    # Trusting IMU for Yaw Velocity
                  false, false, true]   # ✅ CHANGED: Turned OFF Linear X Acceleration!

    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
