slam_toolbox:
  ros__parameters:

    use_sim_time: false

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Laser
    scan_topic: /scan
    min_laser_range: 0.1
    max_laser_range: 30.0

    # Timing
    transform_timeout: 1.0
    tf_buffer_duration: 30.0
    transform_publish_period: 0.05
    minimum_time_interval: 0.0
    scan_queue_size: 1000

    # Map
    resolution: 0.05
    map_update_interval: 2.0

    # Motion thresholds (important for Ackermann vehicles)
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.02

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 5.0

    # Performance
    throttle_scans: 1

    # Mode
    mode: mapping
